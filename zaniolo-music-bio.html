<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaniolo Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      padding: 44px 16px 64px;
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 22px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-img {
      width: 160px;
      height: auto;
      border-radius: 16px;
      display: block;
      box-shadow:
        0 0 0 1px rgba(245,194,0,0.25),
        0 8px 36px rgba(245,194,0,0.15);
    }

    /* ── BIO ── */
    .brand-sub {
      font-size: 10.5px;
      font-weight: 600;
      color: #F5C200;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
      animation: fadeDown 0.6s ease 0.1s both;
    }

    .bio {
      font-size: 13.5px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease 0.15s both;
    }

    /* ── TAGS ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease 0.18s both;
    }

    .tag {
      background: rgba(245,194,0,0.08);
      border: 1px solid rgba(245,194,0,0.2);
      color: rgba(245,194,0,0.8);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 4px 13px;
      border-radius: 100px;
      text-transform: uppercase;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,194,0,0.15), transparent);
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease 0.2s both;
    }

    /* ── BUTTONS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      position: relative;
    }

    .btn::after {
      content: '';
      position: absolute;
      right: 20px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      transform: translateY(-50%) rotate(45deg);
      opacity: 0.35;
      transition: opacity 0.2s, right 0.2s;
    }
    .btn:hover::after { opacity: 0.85; right: 15px; }

    /* Site — botão de topo, amarelo sólido */
    .btn-primary {
      background: #F5C200;
      color: #111;
      box-shadow: 0 4px 22px rgba(245,194,0,0.28);
      animation: fadeUp 0.5s ease 0.26s both;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(245,194,0,0.42);
      background: #ffd000;
    }

    /* Pesquisa Autoral — borda amarela, destaque secundário */
    .btn-accent {
      background: rgba(245,194,0,0.06);
      color: #F5C200;
      border: 1px solid rgba(245,194,0,0.35);
      animation: fadeUp 0.5s ease 0.33s both;
    }
    .btn-accent:hover {
      transform: translateY(-2px);
      background: rgba(245,194,0,0.12);
      border-color: rgba(245,194,0,0.6);
      box-shadow: 0 4px 20px rgba(245,194,0,0.12);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: #f0f0f0;
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeUp 0.5s ease 0.4s both;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(245,194,0,0.07);
      border-color: rgba(245,194,0,0.28);
    }

    .btn-spotify {
      background: rgba(255,255,255,0.04);
      color: #f0f0f0;
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeUp 0.5s ease 0.47s both;
    }
    .btn-spotify:hover {
      transform: translateY(-2px);
      background: rgba(29,185,84,0.07);
      border-color: rgba(29,185,84,0.28);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-accent .btn-icon { background: rgba(245,194,0,0.1); }
    .btn-text { flex: 1; text-align: left; }

    /* ── SOCIAL ── */
    .social {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
      animation: fadeUp 0.5s ease 0.55s both;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.25s, background 0.25s, border-color 0.25s;
    }
    .social-btn:hover {
      transform: translateY(-2px) scale(1.06);
      background: rgba(245,194,0,0.09);
      border-color: rgba(245,194,0,0.3);
    }

    /* ── HANDLE ── */
    .handle {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      animation: fadeUp 0.5s ease 0.6s both;
    }
    .handle span { color: rgba(245,194,0,0.4); }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
